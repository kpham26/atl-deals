<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATL Deals | Browse</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="brand" href="./index.html">🔥 ATL Deals</a>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./deals.html" class="active">Browse Deals</a>
        <a href="./submit.html">Submit Deal</a>
        <a href="./admin.html">Admin</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <section class="browse-header">
      <h1>Browse Deals</h1>
      <p>Search, filter, sort, and save your favorite Atlanta deals.</p>
    </section>

    <section class="controls-panel">
      <input type="text" id="search" placeholder="Search deals, places, or categories..." />

      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="Food">Food</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Fitness">Fitness</option>
        <option value="Shopping">Shopping</option>
      </select>

      <select id="sort-filter">
        <option value="default">Sort: Default</option>
        <option value="title-asc">Sort: A to Z</option>
        <option value="title-desc">Sort: Z to A</option>
        <option value="featured-first">Sort: Featured First</option>
      </select>

      <select id="view-filter">
        <option value="all">Show: All Deals</option>
        <option value="favorites">Show: Favorites Only</option>
      </select>
    </section>

    <section class="chip-row">
      <button class="chip active" data-category="all">All</button>
      <button class="chip" data-category="Food">Food</button>
      <button class="chip" data-category="Entertainment">Entertainment</button>
      <button class="chip" data-category="Fitness">Fitness</button>
      <button class="chip" data-category="Shopping">Shopping</button>
    </section>

    <section class="section-header">
      <div>
        <h2>Available Deals</h2>
        <p id="results-text">Showing all deals</p>
      </div>
      <button class="btn btn-secondary btn-small" id="clear-favorites-btn">Clear Favorites</button>
    </section>

    <section id="deals-grid" class="deals-grid"></section>

    <div id="empty-state" class="empty-state hidden">
      <h3>No deals found</h3>
      <p>Try another search, category, or view filter.</p>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 ATL Deals</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
