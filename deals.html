<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATL Deals - Browse Deals</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="./index.html" class="brand">🔥 ATL Deals</a>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./deals.html" class="active">Deals</a>
        <a href="./submit.html">Submit Deal</a>
        <a href="./admin.html">Admin</a>
      </div>
    </div>
  </nav>

  <main class="container page-top">
    <section class="section-header">
      <div>
        <h1 class="page-title">Browse Deals</h1>
        <p id="results-text">Showing all deals</p>
      </div>
    </section>

    <section class="controls">
      <input type="text" id="search" placeholder="Search deals, places, descriptions..." />

      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="Food">Food</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Fitness">Fitness</option>
        <option value="Shopping">Shopping</option>
      </select>

      <select id="sort-filter">
        <option value="default">Sort: Default</option>
        <option value="title-asc">Sort: A to Z</option>
        <option value="title-desc">Sort: Z to A</option>
        <option value="featured-first">Sort: Featured First</option>
      </select>
    </section>

    <section class="quick-filters">
      <button class="chip active" data-category="all">All</button>
      <button class="chip" data-category="Food">Food</button>
      <button class="chip" data-category="Entertainment">Entertainment</button>
      <button class="chip" data-category="Fitness">Fitness</button>
      <button class="chip" data-category="Shopping">Shopping</button>
      <button class="chip" id="favorites-only-btn" data-mode="all">Favorites Only: Off</button>
    </section>

    <section id="deals-container" class="deals-grid"></section>

    <div id="empty-state" class="empty-state hidden">
      <h3>No deals found</h3>
      <p>Try changing your search or filters.</p>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 ATL Deals</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
