<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATL Deals | Submit</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a class="brand" href="./index.html">🔥 ATL Deals</a>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./deals.html">Browse Deals</a>
        <a href="./submit.html" class="active">Submit Deal</a>
        <a href="./admin.html">Admin</a>
      </div>
    </div>
  </nav>

  <main class="page narrow-page">
    <section class="browse-header">
      <h1>Submit a Deal</h1>
      <p>Add a new Atlanta deal to your site.</p>
    </section>

    <form id="submit-deal-form" class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label for="title">Deal Title</label>
          <input type="text" id="title" required />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="">Choose category</option>
            <option value="Food">Food</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Fitness">Fitness</option>
            <option value="Shopping">Shopping</option>
          </select>
        </div>

        <div class="form-group">
          <label for="place">Business / Place</label>
          <input type="text" id="place" required />
        </div>

        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" value="Atlanta" required />
        </div>

        <div class="form-group">
          <label for="expires">Expires</label>
          <input type="text" id="expires" placeholder="Example: This weekend" required />
        </div>

        <div class="form-group">
          <label for="link">Deal Link</label>
          <input type="url" id="link" placeholder="https://example.com" />
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="5" required></textarea>
      </div>

      <div class="form-check">
        <input type="checkbox" id="featured" />
        <label for="featured">Mark as featured</label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Deal</button>
        <button type="button" class="btn btn-secondary" id="reset-form-btn">Reset</button>
      </div>

      <p id="submit-message" class="form-message"></p>
    </form>
  </main>

  <footer class="footer">
    <p>© 2026 ATL Deals</p>
  </footer>

  <script src="./submit.js"></script>
</body>
</html>
