<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATL Deals</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="brand-row">
        <span class="logo">🔥</span>
        <h1>ATL Deals</h1>
      </div>
      <p class="tagline">Find the best food, entertainment, fitness, and shopping deals in Atlanta.</p>

      <div class="stats">
        <div class="stat-card">
          <span class="stat-number" id="deal-count">0</span>
          <span class="stat-label">Deals</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">ATL</span>
          <span class="stat-label">Location</span>
        </div>
        <div class="stat-card">
          <span class="stat-number">Daily</span>
          <span class="stat-label">Updated</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <input type="text" id="search" placeholder="Search deals, places, or categories..." />

      <select id="category-filter">
        <option value="all">All Categories</option>
        <option value="Food">Food</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Fitness">Fitness</option>
        <option value="Shopping">Shopping</option>
      </select>

      <select id="sort-filter">
        <option value="default">Sort: Default</option>
        <option value="title-asc">Sort: A to Z</option>
        <option value="title-desc">Sort: Z to A</option>
      </select>
    </section>

    <section class="quick-filters">
      <button class="chip active" data-category="all">All</button>
      <button class="chip" data-category="Food">Food</button>
      <button class="chip" data-category="Entertainment">Entertainment</button>
      <button class="chip" data-category="Fitness">Fitness</button>
      <button class="chip" data-category="Shopping">Shopping</button>
    </section>

    <section class="section-header">
      <h2>Available Deals</h2>
      <p id="results-text">Showing all deals</p>
    </section>

    <section id="deals-container" class="deals-grid"></section>

    <div id="empty-state" class="empty-state hidden">
      <h3>No deals found</h3>
      <p>Try a different search or category.</p>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 ATL Deals</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
